version: '3.8'

services:
  mysql:
    image: mysql:8.1
    container_name: tradezone-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: tradezone
      MYSQL_USER: tradezone
      MYSQL_PASSWORD: tradezone_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD','mysqladmin','ping','-h','localhost','-proot_password']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
